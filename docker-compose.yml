services:
  router:
    image: python:3.11-slim
    container_name: dkclaw_router
    restart: unless-stopped
    ports: ["4001:4001"]
    volumes:
      - ./router.py:/app/router.py:ro
      - ./router_config.yaml:/app/router_config.yaml:ro
    environment:
      LITELLM_URL: http://litellm:4000
      ROUTER_CONFIG: /app/router_config.yaml
    entrypoint: ["sh", "-c", "pip install -q fastapi uvicorn httpx pyyaml && python /app/router.py"]
    depends_on:
      litellm: { condition: service_healthy }
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:4001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits: { memory: 512M, cpus: "1.0" }

  litellm:
    image: docker.litellm.ai/berriai/litellm:main-stable
    container_name: litellm_proxy
    restart: unless-stopped
    ports: ["127.0.0.1:4000:4000"]
    volumes: ["./litellm_config.yaml:/app/config.yaml:ro"]
    env_file: [.env]
    environment:
      DATABASE_URL: postgresql://llmproxy:${POSTGRES_PASSWORD}@db:5432/litellm
      STORE_MODEL_IN_DB: "True"
    extra_hosts: ["host.docker.internal:host-gateway"]
    command: ["--config", "/app/config.yaml", "--port", "4000", "--num_workers", "2"]
    depends_on:
      db: { condition: service_healthy }
      redis: { condition: service_healthy }
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4000/health/liveliness"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits: { memory: 2G, cpus: "2.0" }
    logging:
      driver: json-file
      options: { max-size: "50m", max-file: "5" }

  db:
    image: postgres:16-alpine
    container_name: litellm_db
    restart: unless-stopped
    ports: ["127.0.0.1:5432:5432"]
    environment:
      POSTGRES_DB: litellm
      POSTGRES_USER: llmproxy
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes: [postgres_data:/var/lib/postgresql/data]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U llmproxy -d litellm"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    logging:
      driver: json-file
      options: { max-size: "20m", max-file: "3" }

  redis:
    image: redis:7-alpine
    container_name: litellm_redis
    restart: unless-stopped
    ports: ["127.0.0.1:6379:6379"]
    command: redis-server --requirepass ${REDIS_PASSWORD} --maxmemory 256mb --maxmemory-policy allkeys-lru --save "60 1000" --appendonly yes
    volumes: [redis_data:/data]
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: json-file
      options: { max-size: "10m", max-file: "3" }

volumes:
  postgres_data:
    name: litellm_postgres_data
  redis_data:
    name: litellm_redis_data
